# VW Additional Engine Control Modules

[[ecu]]
id = "vw_jetta_2020_ecm"
name = "Jetta 2020 ECM"
module_type = "ECM"
manufacturer_id = "vw"
ecu_manufacturer = "Bosch"
part_numbers = ["04E906027NT"]
supported_protocols = ["can_2.0b", "uds"]
[[ecu.vehicle_models]]
manufacturer = "Volkswagen"
model = "Jetta"
years = [2018, 2019, 2020, 2021, 2022]
[[ecu.connectors]]
connector_id = "C1"
connector_type = "96-pin Bosch"
color = "Black"
[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Battery Power"
voltage = 12.0
signal_type = "Power"
[[ecu.connectors.pins]]
pin_number = 10
signal_name = "CAN High"
signal_type = "CAN"
protocol = "can_2.0b"
[ecu.power_requirements]
voltage_min = 9.0
voltage_nominal = 12.0
voltage_max = 16.0
current_max = 18.0
fuse_rating = 20.0
[ecu.flash_memory]
flash_size_kb = 2048
ram_size_kb = 256
cpu = "Infineon TriCore TC1797"

