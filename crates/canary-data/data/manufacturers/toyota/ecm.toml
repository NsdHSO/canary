# Toyota Camry Engine Control Module (Denso 89661-06D51)

[[ecu]]
id = "toyota_camry_2018_ecm_denso"
name = "Camry Engine Control Module"
module_type = "ECM"
manufacturer_id = "toyota"
ecu_manufacturer = "Denso"
part_numbers = ["89661-06D51", "89661-06D52", "89661-06D53"]
supported_protocols = ["can_2.0b", "iso9141", "kwp2000", "uds"]

[[ecu.vehicle_models]]
manufacturer = "Toyota"
model = "Camry"
years = [2018, 2019, 2020, 2021, 2022]
engine = "2.5L A25A-FKS"

# Main 88-pin connector (E12)
[[ecu.connectors]]
connector_id = "E12"
connector_type = "88-pin Toyota ECM"
color = "Gray"

# Power pins
[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Battery Power"
wire_color = "W"
voltage = 12.0
signal_type = "Power"

[[ecu.connectors.pins]]
pin_number = 2
signal_name = "ECU Ground"
wire_color = "B"
voltage = 0.0
signal_type = "Ground"

[[ecu.connectors.pins]]
pin_number = 3
signal_name = "IG1 Power"
wire_color = "BR"
voltage = 12.0
signal_type = "Power"

# CAN Bus
[[ecu.connectors.pins]]
pin_number = 10
signal_name = "CAN High"
wire_color = "L"
signal_type = "CAN"
protocol = "can_2.0b"

[[ecu.connectors.pins]]
pin_number = 11
signal_name = "CAN Low"
wire_color = "LW"
signal_type = "CAN"
protocol = "can_2.0b"

# K-Line (ISO 9141-2)
[[ecu.connectors.pins]]
pin_number = 15
signal_name = "K-Line"
wire_color = "BR-W"
signal_type = "Digital"
protocol = "iso9141"

