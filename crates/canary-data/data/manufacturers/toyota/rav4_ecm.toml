# Toyota RAV4 Hybrid Engine Control Module (Denso 89661-42Q60)

[[ecu]]
id = "toyota_rav4_hybrid_2020_ecm_denso"
name = "RAV4 Hybrid Engine Control Module"
module_type = "ECM"
manufacturer_id = "toyota"
ecu_manufacturer = "Denso"
part_numbers = ["89661-42Q60", "89661-42Q61", "89661-42Q62"]
supported_protocols = ["can_2.0b", "iso9141", "uds"]

[[ecu.vehicle_models]]
manufacturer = "Toyota"
model = "RAV4 Hybrid"
years = [2019, 2020, 2021, 2022, 2023]
engine = "2.5L A25A-FXS Hybrid"

# Main 100-pin connector (E13)
[[ecu.connectors]]
connector_id = "E13"
connector_type = "100-pin Toyota Hybrid ECM"
color = "Black"

# Power pins
[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Main Battery Power"
wire_color = "W-B"
voltage = 12.0
signal_type = "Power"

[[ecu.connectors.pins]]
pin_number = 2
signal_name = "Ground"
wire_color = "B"
voltage = 0.0
signal_type = "Ground"

[[ecu.connectors.pins]]
pin_number = 3
signal_name = "IG1 Power"
wire_color = "BR"
voltage = 12.0
signal_type = "Power"

# Dual CAN buses
[[ecu.connectors.pins]]
pin_number = 12
signal_name = "CAN High (Powertrain)"
wire_color = "L"
signal_type = "CAN"
protocol = "can_2.0b"

[[ecu.connectors.pins]]
pin_number = 13
signal_name = "CAN Low (Powertrain)"
wire_color = "LW"
signal_type = "CAN"
protocol = "can_2.0b"

[[ecu.connectors.pins]]
pin_number = 14
signal_name = "CAN High (Hybrid)"
