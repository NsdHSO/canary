protocol = "can_2.0b"
[ecu.power_requirements]
voltage_min = 9.0
voltage_nominal = 12.0
voltage_max = 16.0
current_max = 18.0
fuse_rating = 20.0
[ecu.flash_memory]
flash_size_kb = 4096
ram_size_kb = 512
cpu = "Infineon TriCore TC1797"

