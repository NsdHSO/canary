# Honda Engine Control Modules

[[ecu]]
id = "honda_civic_2018_ecm"
name = "Civic 2018 Engine Control Module"
module_type = "ECM"
manufacturer_id = "honda"
ecu_manufacturer = "Keihin"
part_numbers = ["37820-5BA-A73", "37820-5BA-A74"]
supported_protocols = ["can_2.0b", "uds"]

[[ecu.vehicle_models]]
manufacturer = "Honda"
model = "Civic"
years = [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022]
engine = "1.5L Turbo"

[[ecu.connectors]]
connector_id = "C1"
connector_type = "104-pin Keihin"
color = "Black"

[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Battery Power (B+)"
wire_color = "WHT/BLU"
voltage = 12.0
signal_type = "Power"

[[ecu.connectors.pins]]
pin_number = 2
signal_name = "Ground (GND)"
wire_color = "BLK"
voltage = 0.0
signal_type = "Ground"

[[ecu.connectors.pins]]
pin_number = 10
signal_name = "CAN High"
wire_color = "BLU/BLK"
signal_type = "CAN"
protocol = "can_2.0b"

[[ecu.connectors.pins]]
pin_number = 11
signal_name = "CAN Low"
wire_color = "BLU/WHT"
signal_type = "CAN"
protocol = "can_2.0b"

[[ecu.connectors.pins]]
pin_number = 20
signal_name = "MAP Sensor"
wire_color = "GRN/WHT"
voltage = 5.0
signal_type = "SensorInput"
sensor_actuator = "Manifold Absolute Pressure Sensor"

[[ecu.connectors.pins]]
pin_number = 25
signal_name = "Coolant Temperature"
wire_color = "RED/WHT"
voltage = 5.0
signal_type = "SensorInput"
sensor_actuator = "Engine Coolant Temperature Sensor"

[ecu.power_requirements]
voltage_min = 9.0
voltage_nominal = 12.0
voltage_max = 16.0
current_max = 18.0
fuse_rating = 20.0

[ecu.flash_memory]
flash_size_kb = 2048
ram_size_kb = 256
cpu = "Renesas RH850"

