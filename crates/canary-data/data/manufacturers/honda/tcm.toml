# Honda Transmission/Body Control Modules

[[ecu]]
id = "honda_odyssey_2020_ecm"
name = "Odyssey 2020 Engine Control Module"
module_type = "ECM"
manufacturer_id = "honda"
ecu_manufacturer = "Keihin"
part_numbers = ["37820-RLY-A12"]
supported_protocols = ["can_2.0b", "uds"]

[[ecu.vehicle_models]]
manufacturer = "Honda"
model = "Odyssey"
years = [2020]
engine = "3.5L V6"

[[ecu.connectors]]
connector_id = "C1"
connector_type = "104-pin Keihin"
color = "Black"

[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Battery Power (B+)"
voltage = 12.0
signal_type = "Power"

[[ecu.connectors.pins]]
pin_number = 10
signal_name = "CAN High"
signal_type = "CAN"
protocol = "can_2.0b"

[ecu.power_requirements]
voltage_min = 9.0
voltage_nominal = 12.0
voltage_max = 16.0
current_max = 22.0
fuse_rating = 25.0

[ecu.flash_memory]
flash_size_kb = 4096
ram_size_kb = 512
cpu = "Renesas RH850"

