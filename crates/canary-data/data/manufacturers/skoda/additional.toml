# Skoda Additional Engine Control Modules

[[ecu]]
id = "skoda_kodiaq_2020_ecm"
name = "Kodiaq 2020 ECM"
module_type = "ECM"
manufacturer_id = "skoda"
ecu_manufacturer = "Bosch"
part_numbers = ["06L906056TC"]
supported_protocols = ["can_2.0b", "uds"]
[[ecu.vehicle_models]]
manufacturer = "Skoda"
model = "Kodiaq"
years = [2017, 2018, 2019, 2020, 2021, 2022]
[[ecu.connectors]]
connector_id = "C1"
connector_type = "96-pin Bosch"
color = "Black"
[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Battery Power"
voltage = 12.0
signal_type = "Power"
[[ecu.connectors.pins]]
pin_number = 10
signal_name = "CAN High"
signal_type = "CAN"
protocol = "can_2.0b"
[ecu.power_requirements]
voltage_min = 9.0
voltage_nominal = 12.0
voltage_max = 16.0
current_max = 18.0
fuse_rating = 20.0
[ecu.flash_memory]
flash_size_kb = 4096
ram_size_kb = 512
cpu = "Infineon TriCore TC1797"

