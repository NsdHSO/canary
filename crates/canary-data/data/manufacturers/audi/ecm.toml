# Audi A4 B8 Engine Control Module (Bosch MED17.1.1)

[[ecu]]
id = "audi_a4_b8_2012_ecm_med1711"
name = "A4 B8 Engine Control Module"
module_type = "ECM"
manufacturer_id = "audi"
ecu_manufacturer = "Bosch"
part_numbers = ["8K0907115E", "8K0907115F", "8K0907115J"]
supported_protocols = ["can_2.0b", "kwp2000", "uds"]

[[ecu.vehicle_models]]
manufacturer = "Audi"
model = "A4 B8"
years = [2012, 2013, 2014, 2015, 2016]
engine = "2.0L TFSI"

# Main 154-pin connector
[[ecu.connectors]]
connector_id = "T154"
connector_type = "154-pin Bosch EV1.5"
color = "Gray"

# Power pins
[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Battery Power (KL30)"
wire_color = "RD"
voltage = 12.0
signal_type = "Power"

[[ecu.connectors.pins]]
pin_number = 2
signal_name = "ECU Ground"
wire_color = "BR"
voltage = 0.0
signal_type = "Ground"

[[ecu.connectors.pins]]
pin_number = 3
signal_name = "Ignition On (KL15)"
wire_color = "RD/BL"
voltage = 12.0
signal_type = "Power"

# CAN Bus - Powertrain
[[ecu.connectors.pins]]
pin_number = 18
signal_name = "CAN Powertrain High"
wire_color = "OR/BK"
signal_type = "CAN"
protocol = "can_2.0b"

[[ecu.connectors.pins]]
pin_number = 19
signal_name = "CAN Powertrain Low"
wire_color = "OR/BR"
signal_type = "CAN"
protocol = "can_2.0b"

# K-Line Diagnostic
[[ecu.connectors.pins]]
pin_number = 25
signal_name = "K-Line"
wire_color = "WH/BK"
signal_type = "Digital"
protocol = "kwp2000"

# Sensor inputs
[[ecu.connectors.pins]]
pin_number = 32
signal_name = "MAP Sensor Signal"
wire_color = "GY/WH"
voltage = 5.0
signal_type = "SensorInput"
sensor_actuator = "Manifold Absolute Pressure Sensor"

[[ecu.connectors.pins]]
pin_number = 38
signal_name = "Intake Air Temp Sensor"
wire_color = "BL/GN"
voltage = 5.0
signal_type = "SensorInput"
sensor_actuator = "Intake Air Temperature Sensor"

[[ecu.connectors.pins]]
pin_number = 45
signal_name = "O2 Sensor Bank 1 Sensor 1"
wire_color = "GY/BK"
voltage = 0.9
signal_type = "SensorInput"
sensor_actuator = "Oxygen Sensor"

[[ecu.connectors.pins]]
pin_number = 52
signal_name = "Camshaft Position Sensor"
wire_color = "YE/GN"
voltage = 5.0
signal_type = "SensorInput"
sensor_actuator = "Camshaft Position Sensor"

# Actuator outputs
[[ecu.connectors.pins]]
pin_number = 65
signal_name = "Injector 1 Ground"
wire_color = "BK/VT"
voltage = 12.0
signal_type = "ActuatorOutput"
sensor_actuator = "Fuel Injector Cylinder 1"

[[ecu.connectors.pins]]
pin_number = 75
signal_name = "Variable Valve Timing Control"
wire_color = "BN/BL"
voltage = 12.0
signal_type = "PWM"
sensor_actuator = "VVT Solenoid"

[[ecu.connectors.pins]]
pin_number = 85
signal_name = "Throttle Body Control"
wire_color = "GY/RD"
voltage = 12.0
signal_type = "PWM"
sensor_actuator = "Electronic Throttle Body"

# Power requirements
[ecu.power_requirements]
voltage_min = 9.0
voltage_nominal = 12.0
voltage_max = 16.0
current_max = 25.0
power_max = 300.0
fuse_rating = 30.0

# Flash memory specifications
[ecu.flash_memory]
flash_size_kb = 4096
ram_size_kb = 384
eeprom_size_kb = 128
cpu = "Infineon TriCore TC1797"

