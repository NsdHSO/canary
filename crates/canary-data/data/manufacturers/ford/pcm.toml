# Ford F-150 Powertrain Control Module (Continental EEC-VII)

[[ecu]]
id = "ford_f150_2018_pcm_eec7"
name = "F-150 Powertrain Control Module"
module_type = "PCM"
manufacturer_id = "ford"
ecu_manufacturer = "Continental"
part_numbers = ["JL3A-12A650-APA", "JL3A-12A650-APB", "JL3A-12A650-APC"]
