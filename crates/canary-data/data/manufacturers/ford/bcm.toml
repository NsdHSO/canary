# Ford Mustang GT Body Control Module (Continental BCM-II)

[[ecu]]
id = "ford_mustang_gt_2019_bcm_ii"
name = "Mustang GT Body Control Module"
module_type = "BCM"
manufacturer_id = "ford"
ecu_manufacturer = "Continental"
part_numbers = ["JR3T-14D520-AA", "JR3T-14D520-AB", "JR3T-14D520-AC"]
supported_protocols = ["can_2.0b", "lin_2.2", "uds"]

[[ecu.vehicle_models]]
manufacturer = "Ford"
model = "Mustang GT"
years = [2018, 2019, 2020, 2021, 2022]
engine = "5.0L V8"

# Main 48-pin connector
[[ecu.connectors]]
connector_id = "C230"
