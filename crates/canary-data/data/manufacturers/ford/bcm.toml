color = "Natural"

# Power pins
[[ecu.connectors.pins]]
pin_number = 1
signal_name = "Battery Direct"
wire_color = "RD"
voltage = 12.0
signal_type = "Power"

[[ecu.connectors.pins]]
pin_number = 2
signal_name = "Ground"
wire_color = "BK"
voltage = 0.0
signal_type = "Ground"

[[ecu.connectors.pins]]
pin_number = 3
signal_name = "Ignition Run/Start"
wire_color = "PK/LG"
voltage = 12.0
signal_type = "Power"

# CAN Bus - HS and MS
[[ecu.connectors.pins]]
pin_number = 8
signal_name = "HS-CAN High"
wire_color = "VT/OR"
signal_type = "CAN"
protocol = "can_2.0b"

[[ecu.connectors.pins]]
pin_number = 9
signal_name = "HS-CAN Low"
wire_color = "TN/OR"
signal_type = "CAN"
